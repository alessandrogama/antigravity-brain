<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANTIGRAVITY BRAIN v1.0</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div id="neural-bg"></div>
  <div class="scanline"></div>

  <!-- TOP STATUS BAR -->
  <header class="cerebrum-top">
    <div class="top-left">
      <div class="logo-dot"></div>
      <div class="app-name">ANTIGRAVITY BRAIN <span class="version">v1.0</span></div>
    </div>
    <div class="top-right">
      <div class="sync-status">
        <span class="dim">SYNC STATUS:</span> <span class="status-val">ENCRYPTED</span>
        <div class="progress-bar">
          <div class="fill"></div>
        </div>
      </div>
      <div class="top-icons">
        <div class="user-avatar">
          <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=aless" alt="avatar">
        </div>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <!-- SIDEBAR: Vault Style -->
    <aside class="cerebrum-sidebar">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input type="text" id="search" placeholder="Search (Ctrl+K)" oninput="onSearch(this.value)">
      </div>
      <div id="search-results"></div>

      <div class="sidebar-content">
        <!-- PROJECTS ONLY -->
        <div class="vault-section">
          <div class="section-header" onclick="toggleSection('vault-projects')">
            <svg class="chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="3">
              <path d="m6 9 6 6 6-6" />
            </svg>
            <span id="lbl-vault">PROJECTS</span>
          </div>
          <div class="section-body" id="vault-projects">
            <div id="sub-projects">
              <!-- Dinamicamente preenchido -->
            </div>
          </div>
        </div>

        <!-- TAGS -->
        <div class="vault-section">
          <div class="section-header" onclick="toggleSection('vault-tags')">
            <svg class="chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="3">
              <path d="m6 9 6 6 6-6" />
            </svg>
            <span id="lbl-tags">TAGS</span>
          </div>
          <div class="section-body" id="vault-tags">
            <div class="tag-cloud" id="tag-container"></div>
          </div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="stat-line">Nodes: <span id="stat-nodes">0</span></div>
        <div class="stat-line"><span class="online-dot"></span> Online</div>
      </div>
    </aside>

    <!-- MAIN CANVAS -->
    <main class="cerebrum-main">
      <div id="canvas-wrap">
        <canvas id="c"></canvas>

        <!-- Minimap Widget -->
        <div class="glass-panel minimap-box">
          <div class="minimap-header">MINIMAP</div>
          <div id="minimap-container">
            <canvas id="minimap-canvas"></canvas>
            <div id="minimap-viewport"></div>
          </div>
        </div>

        <!-- Assistant -->
        <div class="pixel-assistant-wrap">
          <div class="speech-bubble" id="assistant-text">Analyzing thought patterns...</div>
          <div class="pixel-avatar">
            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=brainy&backgroundColor=b6e3f4" alt="assistant">
          </div>
        </div>

        <!-- Floating Detail Panel -->
        <div class="hud-detail" id="hud-detail-panel">
          <div class="glass-panel detail-box">
            <button class="close-detail" onclick="focusNode(null)">×</button>
            <div id="node-detail"></div>
          </div>
        </div>

        <div class="floating-legend glass-panel">
          <div id="legend"></div>
        </div>

        <div id="zoom-indicator">100%</div>
      </div>
    </main>
  </div>

  <!-- BOTTOM BAR -->
  <footer class="cerebrum-footer">
    <div class="footer-left">
      <span class="key-hint">Press <span class="key">Ctrl</span> + <span class="key">K</span> for command palette</span>
      <span class="divider"></span>
      <span class="dim">Sharing:</span> Private
    </div>
    <div class="footer-right">
      <span class="lang-selector">
        <select id="lang-select" onchange="changeLang(this.value)">
          <option value="en" selected>EN</option>
          <option value="pt">PT</option>
          <option value="es">ES</option>
        </select>
      </span>
      <span class="divider"></span>
      <span class="status-item"><span class="online-dot"></span> Local Instance</span>
      <span class="status-item dim">LATENCY: 12ms</span>
    </div>
  </footer>

  <div id="tooltip"></div>

  <div id="error-overlay" class="hidden">
    <div class="error-title">CONNECTION LOST</div>
    <div class="error-sub" id="msg-error">Verify local Cerebrum instance status.</div>
    <button class="ctrl-btn" onclick="location.reload()">RECONNECT</button>
  </div>

  <script src="assets/js/script.js?v=2.3"></script>
</body>

</html>
